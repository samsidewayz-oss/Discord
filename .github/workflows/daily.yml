name: SIDEWAYZ Daily Assistant

on:
  workflow_dispatch:
  schedule:
    - cron: "45 12 * * *"

jobs:
  calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Debug repository
        run: |
          echo "========== CURRENT DIRECTORY =========="
          pwd

          echo ""
          echo "========== REPOSITORY ROOT =========="
          ls -la

          echo ""
          echo "========== MODULES DIRECTORY =========="
          ls -la modules || echo "❌ modules directory not found"

          echo ""
          echo "========== WEATHER FILE =========="
          cat modules/weather.py || echo "❌ weather.py not found"

          echo ""
          echo "========== PYTHON VERSION =========="
          python --version

          echo ""
          echo "========== PYTHON PATH =========="
          python -c "import sys; print('\n'.join(sys.path))"

          echo ""
          echo "========== TEST IMPORT: modules =========="
          python -c "import modules; print('✅ modules imported successfully')"

          echo ""
          echo "========== TEST IMPORT: weather =========="
          python -c "import modules.weather; print('✅ weather imported successfully')"

          echo ""
          echo "========== TEST IMPORT: formatter =========="
          python -c "import modules.formatter; print('✅ formatter imported successfully')"

          echo ""
          echo "========== GIT COMMIT =========="
          git rev-parse HEAD

          - name: Test main import
          run: |
          python -c "import main; print('✅ main imported successfully')"

      - name: Run assistant
        env:
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          python main.py
